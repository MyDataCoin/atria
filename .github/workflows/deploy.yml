name: CI + Deploy
# Build on every push/PR; deploy the static bundle to the Ubuntu server only on pushes to
# the default branch (and manual runs). Connection details are GitHub Secrets — nothing
# sensitive lives in this file. Only three secrets are needed:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PASSWORD, DEPLOY_SSH_PORT
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    # Never deploy from pull requests (incl. forks) — only direct pushes / manual runs.
    if: github.event_name != 'pull_request'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package the built bundle
        # Pack only the contents of dist/ (the -C avoids nesting a dist/ folder in the tar).
        run: tar -czf deploy.tar.gz -C dist .

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/opt/atria-frontend"
          overwrite: true

      - name: Unpack into the web root on the server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            set -euo pipefail

            # nginx serves the site from here. Change if your server uses a different path.
            WEB_ROOT="/var/www/atria"

            cd /opt/atria-frontend

            # Stage the new files in a temp dir, then swap atomically so visitors never see a
            # half-written site. Wipe the staging dir first to drop files removed in git.
            rm -rf release
            mkdir -p release
            tar -xzf deploy.tar.gz -C release
            rm -f deploy.tar.gz

            sudo mkdir -p "$WEB_ROOT"
            sudo rm -rf "${WEB_ROOT:?}"/*
            sudo cp -r release/. "$WEB_ROOT"/
            rm -rf release

            # Pick up the new files immediately.
            sudo nginx -t && sudo systemctl reload nginx

            ls -la "$WEB_ROOT"
