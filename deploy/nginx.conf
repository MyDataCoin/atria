# nginx-конфиг для фронтенда Atria (atria.eaysdev.online).
# Кладётся на сервер в /etc/nginx/sites-available/atria и линкуется в sites-enabled.
#
# ВАЖНО: сайт работает по HTTPS, поэтому location /api/ ОБЯЗАН находиться внутри
# server-блока с `listen 443 ssl` — именно он обслуживает живой трафик. Если положить
# прокси только в блок `listen 80`, то POST /api/... по HTTPS попадёт в обработчик
# статики и вернёт 405 Not Allowed (что мы и видим).
#
# Пути сертификатов — стандартные для certbot/Let's Encrypt. Если certbot уже
# управляет конфигом этого домена, не дублируй server-блоки: просто добавь блок
# `location /api/ { ... }` в существующий server { listen 443 ssl; ... }.

# 80 → 443 (весь http-трафик на https)
server {
    listen 80;
    server_name atria.eaysdev.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name atria.eaysdev.online;

    ssl_certificate     /etc/letsencrypt/live/atria.eaysdev.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atria.eaysdev.online/privkey.pem;

    root /var/www/atria;
    index index.html;

    # Прокси API на бэкенд. Браузер ходит на свой же домен → CORS не нужен.
    # proxy_pass без пути сохраняет префикс /api (бэкенд ждёт /api/v1/...).
    location /api/ {
        proxy_pass https://atria-api.eaysdev.online;
        proxy_http_version 1.1;
        proxy_set_header Host atria-api.eaysdev.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Долгий кэш для хешированных ассетов Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: всё остальное отдаёт index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}