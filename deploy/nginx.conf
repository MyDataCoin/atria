# nginx-конфиг для фронтенда Atria (atria.eaysdev.online).
# Кладётся на сервер, напр. в /etc/nginx/sites-available/atria, и линкуется в
# sites-enabled. Решает две задачи:
#   1) SPA-роутинг: любой путь отдаёт index.html (иначе F5 на /какой-то-путь → 404);
#   2) /api проксируется на бэкенд — браузер ходит на СВОЙ домен, поэтому CORS не нужен
#      (тот же приём, что и dev-прокси Vite). Без этого POST /api/... к статике → 405.

server {
    listen 80;
    server_name atria.eaysdev.online;

    root /var/www/atria;
    index index.html;

    # Прокси API на бэкенд. Слэши в proxy_pass и location важны: префикс /api
    # сохраняется (бэкенд ждёт /api/v1/...). HTTPS-апстрим, host подменяем под бэкенд.
    location /api/ {
        proxy_pass https://atria-api.eaysdev.online;
        proxy_http_version 1.1;
        proxy_set_header Host atria-api.eaysdev.online;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # SPA: статика отдаётся напрямую, всё остальное — index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгий кэш для хешированных ассетов Vite (имена меняются при каждой сборке).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}